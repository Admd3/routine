<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="theme-color" content="#085041">
<title>Routine</title>
<style>
:root {
  --green-deep: #085041;
  --teal: #1D9E75;
  --coral: #993C1D;
  --amber: #EF9F27;
  --bg: #F5F3F0;
  --bg-card: #FFFFFF;
  --bg-input: #F0EEEB;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6560;
  --text-tertiary: #9B9590;
  --border: #E5E2DE;
  --radius: 14px;
  --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0E0E0E;
    --bg-card: #1A1A1A;
    --bg-input: #252525;
    --text-primary: #F0EEEB;
    --text-secondary: #8A8580;
    --text-tertiary: #5A5550;
    --border: #2A2A2A;
  }
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height:100%; font-family:var(--font); background:var(--bg);
  color:var(--text-primary); overscroll-behavior:none; -webkit-font-smoothing:antialiased;
}
body { padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
button { font-family:var(--font); border:none; cursor:pointer; -webkit-user-select:none; user-select:none; }
input, textarea, select {
  font-family:var(--font); font-size:16px; border:none; outline:none;
  background:var(--bg-input); color:var(--text-primary); border-radius:10px; padding:12px 14px; width:100%;
}
textarea { resize:none; min-height:60px; }

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; background:var(--bg); position:sticky; top:0; z-index:100;
}
.header-title { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
.header-btn {
  background:var(--bg-input); color:var(--text-primary); font-size:13px;
  font-weight:600; padding:8px 16px; border-radius:20px; letter-spacing:-0.1px;
}
.header-btn.active { background:var(--teal); color:#fff; }

.notif-banner {
  margin:0 20px 8px; padding:10px 14px; border-radius:10px;
  background:var(--amber); color:#1A1A1A; font-size:13px; font-weight:600;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.notif-banner button {
  background:rgba(0,0,0,0.15); color:#1A1A1A; font-size:12px;
  font-weight:700; padding:6px 12px; border-radius:8px; flex-shrink:0;
}

.day-tabs { display:flex; gap:4px; padding:0 20px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.day-tabs::-webkit-scrollbar { display:none; }
.day-tab {
  flex-shrink:0; background:var(--bg-input); color:var(--text-secondary);
  font-size:13px; font-weight:600; padding:8px 14px; border-radius:10px;
}
.day-tab.active { background:var(--green-deep); color:#fff; }

.builder-container { padding:0 20px 100px; }
.task-list { display:flex; flex-direction:column; gap:8px; }
.task-item {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:12px;
}
.task-item .drag-handle { color:var(--text-tertiary); font-size:18px; cursor:grab; flex-shrink:0; }
.task-item .task-info { flex:1; min-width:0; }
.task-item .task-name {
  font-size:15px; font-weight:600; letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px;
}
.task-item .task-meta { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.task-item .task-badges { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.task-badge {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
  padding:2px 7px; border-radius:4px;
}
.task-badge.block-on { background:rgba(153,60,29,0.12); color:var(--coral); }
.task-badge.block-off { background:rgba(29,158,117,0.1); color:var(--teal); }
.task-item .task-time-slot { font-size:12px; color:var(--text-tertiary); font-variant-numeric:tabular-nums; }
.task-actions { display:flex; gap:6px; flex-shrink:0; }
.task-action-btn {
  width:32px; height:32px; border-radius:8px; background:var(--bg-input);
  color:var(--text-secondary); font-size:14px; display:flex; align-items:center; justify-content:center;
}
.add-task-btn {
  width:100%; padding:14px; border-radius:var(--radius); background:var(--bg-card);
  border:2px dashed var(--border); color:var(--text-secondary); font-size:14px; font-weight:600; margin-top:8px;
}
.total-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px; font-size:13px; color:var(--text-secondary); font-weight:500;
}
.copy-bar { padding:0 20px 8px; display:flex; gap:8px; }
.copy-btn {
  font-size:12px; font-weight:600; padding:6px 12px;
  border-radius:8px; background:var(--bg-input); color:var(--text-secondary);
}

.lock-icon { width:14px; height:14px; flex-shrink:0; display:inline-block; vertical-align:middle; }
.lock-icon.unskippable { color:var(--coral); }
.lock-icon.flexible { color:var(--text-tertiary); opacity:0.5; }

.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal {
  background:var(--bg-card); border-radius:20px 20px 0 0; width:100%; max-width:500px;
  padding:24px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:90vh; overflow-y:auto;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-title { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
.modal-close {
  width:30px; height:30px; border-radius:50%; background:var(--bg-input);
  color:var(--text-secondary); font-size:18px; display:flex; align-items:center; justify-content:center;
}
.form-group { margin-bottom:14px; }
.form-label {
  font-size:12px; font-weight:600; color:var(--text-secondary);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; display:block;
}
.duration-row { display:flex; gap:8px; align-items:center; }
.duration-row input { flex:1; }
.duration-row span { font-size:13px; color:var(--text-secondary); flex-shrink:0; }
.type-toggle { display:flex; gap:4px; background:var(--bg-input); border-radius:10px; padding:3px; }
.type-option {
  flex:1; padding:10px; border-radius:8px; font-size:13px; font-weight:600;
  text-align:center; background:transparent; color:var(--text-secondary); transition:all 0.15s;
}
.type-option.active { background:var(--bg-card); color:var(--text-primary); }
.type-option.active.unskippable { color:var(--coral); }

.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
.toggle-row-label { font-size:14px; font-weight:600; color:var(--text-primary); }
.toggle-row-sub { font-size:12px; color:var(--text-secondary); margin-top:1px; }
.toggle-switch {
  width:50px; height:30px; border-radius:15px; background:var(--bg-input);
  position:relative; cursor:pointer; transition:background 0.2s; flex-shrink:0;
}
.toggle-switch.on { background:var(--coral); }
.toggle-switch::after {
  content:''; position:absolute; top:3px; left:3px; width:24px; height:24px;
  border-radius:50%; background:#fff; transition:transform 0.2s;
}
.toggle-switch.on::after { transform:translateX(20px); }

.save-btn {
  width:100%; padding:16px; border-radius:12px; background:var(--teal);
  color:#fff; font-size:16px; font-weight:700; margin-top:6px;
}
.delete-btn {
  width:100%; padding:12px; background:transparent; color:var(--coral);
  font-size:14px; font-weight:600; margin-top:8px;
}

.run-container {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:calc(100vh - 80px - env(safe-area-inset-top)); padding:20px; text-align:center;
}
.streak-dots { display:flex; gap:8px; margin-bottom:24px; }
.streak-dot { width:10px; height:10px; border-radius:50%; background:var(--border); }
.streak-dot.filled { background:var(--teal); }
.streak-dot.today { border:2px solid var(--teal); }

.block-status-banner {
  display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px; padding:6px 14px; border-radius:8px; margin-bottom:20px;
}
.block-status-banner.blocked { background:rgba(153,60,29,0.12); color:var(--coral); }
.block-status-banner.unblocked { background:rgba(29,158,117,0.1); color:var(--teal); }

.timer-ring-container { position:relative; width:220px; height:220px; margin-bottom:28px; }
.timer-ring-container svg { width:100%; height:100%; transform:rotate(-90deg); }
.timer-ring-bg { fill:none; stroke:var(--border); stroke-width:6; }
.timer-ring-progress {
  fill:none; stroke:var(--teal); stroke-width:6; stroke-linecap:round;
  transition:stroke-dashoffset 0.5s linear;
}
.timer-text {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.timer-digits {
  font-size:42px; font-weight:700; letter-spacing:-1px;
  font-variant-numeric:tabular-nums; color:var(--text-primary);
}
.timer-label { font-size:12px; color:var(--text-secondary); margin-top:2px; font-weight:500; }
.run-task-name { font-size:22px; font-weight:700; letter-spacing:-0.4px; margin-bottom:6px; }
.run-task-note { font-size:14px; color:var(--text-secondary); max-width:300px; line-height:1.4; margin-bottom:6px; }
.run-task-type-badge {
  display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px; padding:4px 10px; border-radius:6px; margin-bottom:28px;
}
.run-task-type-badge.unskippable { background:rgba(153,60,29,0.12); color:var(--coral); }
.run-task-type-badge.flexible { background:rgba(29,158,117,0.12); color:var(--teal); }
.complete-btn {
  width:100%; max-width:320px; padding:18px; border-radius:14px;
  font-size:16px; font-weight:700; transition:all 0.2s;
}
.complete-btn.disabled { background:var(--bg-input); color:var(--text-tertiary); pointer-events:none; }
.complete-btn.enabled { background:var(--teal); color:#fff; }

.next-task-screen {
  position:fixed; inset:0; background:var(--green-deep); z-index:300;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 24px; text-align:center; color:#fff;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.next-task-screen.open { opacity:1; pointer-events:auto; }
.next-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:2px; opacity:0.5; margin-bottom:16px; }
.next-task-name { font-size:28px; font-weight:700; letter-spacing:-0.5px; margin-bottom:10px; }
.next-task-note { font-size:14px; opacity:0.65; max-width:300px; line-height:1.5; margin-bottom:24px; }
.adjustment-msg {
  font-size:13px; font-weight:600; color:var(--amber); background:rgba(239,159,39,0.12);
  padding:8px 16px; border-radius:10px; margin-bottom:24px; max-width:340px;
}
.next-block-status {
  font-size:12px; font-weight:600; padding:6px 14px; border-radius:8px; margin-bottom:16px;
}
.next-block-status.blocked { background:rgba(153,60,29,0.25); color:#ff9880; }
.next-block-status.unblocked { background:rgba(29,158,117,0.2); color:#7fffcc; }
.next-block-change {
  font-size:12px; font-weight:700; padding:5px 12px; border-radius:6px;
  margin-bottom:12px; background:rgba(239,159,39,0.2); color:var(--amber);
}
.next-countdown { font-size:56px; font-weight:700; font-variant-numeric:tabular-nums; margin-bottom:32px; opacity:0.9; }
.start-btn {
  width:100%; max-width:320px; padding:18px; border-radius:14px;
  font-size:16px; font-weight:700; transition:all 0.2s;
}
.start-btn.disabled { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); pointer-events:none; }
.start-btn.enabled { background:#fff; color:var(--green-deep); }

.day-complete-screen {
  position:fixed; inset:0; background:var(--green-deep); z-index:300;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 24px; text-align:center; color:#fff;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.day-complete-screen.open { opacity:1; pointer-events:auto; }
.day-complete-icon { font-size:64px; margin-bottom:20px; }
.day-complete-title { font-size:26px; font-weight:700; margin-bottom:8px; }
.day-complete-sub { font-size:14px; opacity:0.6; margin-bottom:32px; }
.day-complete-btn {
  background:rgba(255,255,255,0.15); color:#fff; padding:14px 32px;
  border-radius:12px; font-size:15px; font-weight:600;
}

.idle-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:calc(100vh - 80px - env(safe-area-inset-top)); padding:40px 24px; text-align:center;
}
.idle-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
.idle-title { font-size:20px; font-weight:700; margin-bottom:6px; }
.idle-sub { font-size:14px; color:var(--text-secondary); max-width:260px; line-height:1.4; }

.hidden { display:none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Routine</div>
  <div style="display:flex;gap:6px;">
    <button class="header-btn" id="btnBuilder" onclick="switchMode('builder')">Builder</button>
    <button class="header-btn" id="btnRun" onclick="switchMode('run')">Run</button>
  </div>
</div>

<div class="notif-banner hidden" id="notifBanner">
  <span>Enable notifications for task alerts</span>
  <button onclick="requestNotifPermission()">Enable</button>
</div>

<div id="builderMode" class="hidden">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="copy-bar">
    <button class="copy-btn" onclick="copyToAllDays()">Copy to Mon–Fri</button>
    <button class="copy-btn" onclick="clearDay()">Clear Day</button>
  </div>
  <div class="total-bar">
    <span id="totalTasks">0 tasks</span>
    <span id="totalTime">0h 0m / 14h 30m</span>
  </div>
  <div class="builder-container">
    <div class="task-list" id="taskList"></div>
    <button class="add-task-btn" onclick="openModal()">+ Add Task</button>
  </div>
</div>

<div id="runMode" class="hidden"></div>

<div class="next-task-screen" id="nextTaskScreen">
  <div class="next-label">Next Up</div>
  <div class="next-task-name" id="nextTaskName"></div>
  <div class="next-task-note" id="nextTaskNote"></div>
  <div class="adjustment-msg hidden" id="adjustmentMsg"></div>
  <div class="next-block-status hidden" id="nextBlockStatus"></div>
  <div class="next-block-change hidden" id="nextBlockChange"></div>
  <div class="next-countdown" id="nextCountdown">60</div>
  <button class="start-btn disabled" id="startBtn" onclick="startNextTask()">Start Task</button>
</div>

<div class="day-complete-screen" id="dayCompleteScreen">
  <div class="day-complete-icon">✓</div>
  <div class="day-complete-title">Day Complete</div>
  <div class="day-complete-sub">You've finished your routine for today.</div>
  <button class="day-complete-btn" onclick="closeDayComplete()">Back to Builder</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Task</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Task Name</label>
      <input type="text" id="taskNameInput" placeholder="e.g. Deep work block">
    </div>
    <div class="form-group">
      <label class="form-label">Duration</label>
      <div class="duration-row">
        <input type="number" id="taskDurationInput" placeholder="30" min="1" max="870" inputmode="numeric">
        <span>minutes</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note</label>
      <textarea id="taskNoteInput" placeholder="Optional note..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="type-toggle">
        <button class="type-option active" id="typeFlexible" onclick="setType('flexible')">Flexible</button>
        <button class="type-option" id="typeUnskippable" onclick="setType('unskippable')">Unskippable</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">App Blocking</label>
      <div class="toggle-row">
        <div>
          <div class="toggle-row-label">Block Apps</div>
          <div class="toggle-row-sub">Reminder to enable Screen Time focus</div>
        </div>
        <div class="toggle-switch on" id="blockAppsToggle" onclick="toggleBlockApps()"></div>
      </div>
    </div>
    <button class="save-btn" id="saveBtn" onclick="saveTask()">Add Task</button>
    <button class="delete-btn hidden" id="deleteBtn" onclick="deleteTask()">Delete Task</button>
  </div>
</div>

<script>
const DAYS=['Mon','Tue','Wed','Thu','Fri'], DAY_START=450, DAY_END=1320, MAX_MIN=870;
let st={mode:'builder',selDay:0,editIdx:-1,taskType:'flexible',blockApps:true,
  schedules:{Mon:[],Tue:[],Wed:[],Thu:[],Fri:[]},runState:null,streaks:[]};

function load(){try{const s=localStorage.getItem('routine_v3');if(s){const p=JSON.parse(s);st.schedules=p.schedules||st.schedules;st.streaks=p.streaks||[];st.runState=p.runState||null;}}catch(e){}}
function save(){try{localStorage.setItem('routine_v3',JSON.stringify({schedules:st.schedules,streaks:st.streaks,runState:st.runState}));}catch(e){}}

function fmt(m){const h=Math.floor(m/60),mn=m%60;return h>0?`${h}h ${mn}m`:`${mn}m`;}
function fmtT(t){const h=Math.floor(t/60),m=t%60,a=h>=12?'PM':'AM',h2=h>12?h-12:h||12;return`${h2}:${String(m).padStart(2,'0')} ${a}`;}
function fmtS(s){if(s<0)s=0;return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function todayKey(){const d=new Date().getDay();return d>=1&&d<=5?DAYS[d-1]:null;}
function dStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function lockSvg(t){return t==='unskippable'?`<svg class="lock-icon unskippable" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`:`<svg class="lock-icon flexible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 3"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;}

// ─── NOTIFICATIONS ───
function checkNotifBanner(){
  const b=document.getElementById('notifBanner');
  b.classList.toggle('hidden',!('Notification' in window)||Notification.permission!=='default');
}
function requestNotifPermission(){
  if(!('Notification' in window))return;
  Notification.requestPermission().then(()=>checkNotifBanner());
}
function notify(title,body,tag,actions){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  if('serviceWorker' in navigator&&navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title,{
        body,tag,renotify:true,requireInteraction:true,
        vibrate:[200,100,200,100,200],
        data:{url:location.href},
        actions:actions||[]
      }).catch(()=>fallbackNotif(title,body,tag));
    });
  } else fallbackNotif(title,body,tag);
}
function fallbackNotif(title,body,tag){
  const n=new Notification(title,{body,tag,requireInteraction:true});
  n.onclick=()=>{window.focus();n.close();};
}
function forceOpen(){
  window.focus();
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();o.frequency.value=1;o.connect(c.destination);o.start();o.stop(c.currentTime+0.001);}catch(e){}
}

// ─── MODE ───
function switchMode(m){
  st.mode=m;
  document.getElementById('btnBuilder').classList.toggle('active',m==='builder');
  document.getElementById('btnRun').classList.toggle('active',m==='run');
  document.getElementById('builderMode').classList.toggle('hidden',m!=='builder');
  document.getElementById('runMode').classList.toggle('hidden',m!=='run');
  m==='builder'?renderBuilder():renderRun();
}

// ─── BUILDER ───
function renderBuilder(){renderDayTabs();renderTaskList();}
function renderDayTabs(){
  document.getElementById('dayTabs').innerHTML=DAYS.map((d,i)=>
    `<button class="day-tab ${i===st.selDay?'active':''}" onclick="selectDay(${i})">${d}</button>`
  ).join('');
}
function selectDay(i){st.selDay=i;renderBuilder();}
function curTasks(){return st.schedules[DAYS[st.selDay]]||[];}
function renderTaskList(){
  const tasks=curTasks(),el=document.getElementById('taskList');let cum=DAY_START;
  el.innerHTML=tasks.map((t,i)=>{
    const start=fmtT(cum);cum+=t.duration;
    const bl=t.blockApps!==false,blLbl=bl?'Apps blocked':'Apps free',blCls=bl?'block-on':'block-off';
    return`<div class="task-item" draggable="true" ondragstart="ds(event,${i})" ondragover="dv(event)" ondrop="dp(event,${i})">
      <span class="drag-handle">⠿</span>
      <div class="task-info">
        <div class="task-name">${lockSvg(t.type)} ${esc(t.name)}</div>
        <div class="task-meta">${fmt(t.duration)}${t.note?' · '+esc(t.note):''}</div>
        <div class="task-badges"><span class="task-badge ${blCls}">${blLbl}</span></div>
      </div>
      <div class="task-time-slot">${start}</div>
      <div class="task-actions"><button class="task-action-btn" onclick="openModal(${i})">✎</button></div>
    </div>`;
  }).join('');
  const tot=tasks.reduce((s,t)=>s+t.duration,0);
  document.getElementById('totalTasks').textContent=`${tasks.length} task${tasks.length!==1?'s':''}`;
  document.getElementById('totalTime').textContent=`${fmt(tot)} / ${fmt(MAX_MIN)}`;
}
let _di=-1;
function ds(e,i){_di=i;e.dataTransfer.effectAllowed='move';}
function dv(e){e.preventDefault();}
function dp(e,i){e.preventDefault();if(_di===i)return;const d=DAYS[st.selDay],ts=st.schedules[d],[it]=ts.splice(_di,1);ts.splice(i,0,it);save();renderTaskList();}

function openModal(idx){
  const ov=document.getElementById('modalOverlay');
  if(idx!==undefined&&idx>=0){
    st.editIdx=idx;const t=curTasks()[idx];
    document.getElementById('taskNameInput').value=t.name;
    document.getElementById('taskDurationInput').value=t.duration;
    document.getElementById('taskNoteInput').value=t.note||'';
    setType(t.type);st.blockApps=t.blockApps!==false;
    document.getElementById('blockAppsToggle').classList.toggle('on',st.blockApps);
    document.getElementById('modalTitle').textContent='Edit Task';
    document.getElementById('saveBtn').textContent='Save Changes';
    document.getElementById('deleteBtn').classList.remove('hidden');
  } else {
    st.editIdx=-1;
    document.getElementById('taskNameInput').value='';
    document.getElementById('taskDurationInput').value='';
    document.getElementById('taskNoteInput').value='';
    setType('flexible');st.blockApps=true;
    document.getElementById('blockAppsToggle').classList.add('on');
    document.getElementById('modalTitle').textContent='Add Task';
    document.getElementById('saveBtn').textContent='Add Task';
    document.getElementById('deleteBtn').classList.add('hidden');
  }
  ov.classList.add('open');
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modalOverlay').classList.remove('open');}
function setType(t){
  st.taskType=t;
  document.getElementById('typeFlexible').classList.toggle('active',t==='flexible');
  document.getElementById('typeUnskippable').classList.toggle('active',t==='unskippable');
  document.getElementById('typeUnskippable').classList.toggle('unskippable',t==='unskippable');
}
function toggleBlockApps(){st.blockApps=!st.blockApps;document.getElementById('blockAppsToggle').classList.toggle('on',st.blockApps);}
function saveTask(){
  const name=document.getElementById('taskNameInput').value.trim();
  const dur=parseInt(document.getElementById('taskDurationInput').value)||0;
  const note=document.getElementById('taskNoteInput').value.trim();
  if(!name||dur<1)return;
  const day=DAYS[st.selDay],task={name,duration:Math.min(dur,MAX_MIN),note,type:st.taskType,blockApps:st.blockApps};
  st.editIdx>=0?st.schedules[day][st.editIdx]=task:st.schedules[day].push(task);
  save();closeModal();renderTaskList();
}
function deleteTask(){if(st.editIdx<0)return;st.schedules[DAYS[st.selDay]].splice(st.editIdx,1);save();closeModal();renderTaskList();}
function copyToAllDays(){const src=DAYS[st.selDay],ts=JSON.parse(JSON.stringify(st.schedules[src]));DAYS.forEach(d=>{st.schedules[d]=JSON.parse(JSON.stringify(ts));});save();renderTaskList();}
function clearDay(){st.schedules[DAYS[st.selDay]]=[];save();renderTaskList();}

// ─── RUN ───
let runTmr=null,nxtTmr=null,bgTmr=null,endTO=null;

function computeAdj(){
  const rs=st.runState;if(!rs)return[];
  const tasks=JSON.parse(JSON.stringify(st.schedules[rs.dayKey]||[]));
  for(const a of rs.adjustments){
    for(let i=a.taskIndex+1;i<tasks.length;i++){
      if(tasks[i].type==='flexible'){
        const orig=(st.schedules[rs.dayKey][i]||{}).duration||0;
        tasks[i].duration=Math.max(0,tasks[i].duration-a.overranBy);
        tasks[i]._adj=true;tasks[i]._adjBy=a.overranBy;tasks[i]._adjOrig=orig;
        break;
      }
    }
  }
  return tasks;
}

function renderRun(){
  clearInterval(runTmr);clearInterval(nxtTmr);
  const c=document.getElementById('runMode'),dk=todayKey(),now=new Date(),nm=now.getHours()*60+now.getMinutes();
  if(!dk){c.innerHTML=idle('☀','It\'s the weekend','Routine runs Mon–Fri.');return;}
  const tasks=st.schedules[dk]||[];
  if(!tasks.length){c.innerHTML=idle('📋',`No tasks for ${dk}`,'Set up in Builder mode.');return;}
  if(nm>=DAY_END){markDone();c.innerHTML=idle('🌙','Day\'s over','Past 10 PM. See you tomorrow.');return;}
  if(nm<DAY_START){c.innerHTML=idle('⏰','Not yet','Routine starts at 7:30 AM.');return;}
  if(st.runState&&st.runState.dayKey===dk&&st.runState.date===dStr(now)){
    st.runState.startTime?renderActive():showNext();return;
  }
  st.runState={dayKey:dk,date:dStr(now),taskIndex:0,startTime:null,adjustments:[],completedTasks:0};
  save();showNext();
}

function idle(icon,title,sub){return`<div class="idle-screen"><div class="idle-icon">${icon}</div><div class="idle-title">${title}</div><div class="idle-sub">${sub}</div></div>`;}

function showNext(){
  const rs=st.runState,tasks=computeAdj();
  if(rs.taskIndex>=tasks.length){markDone();showDayDone();return;}
  const task=tasks[rs.taskIndex];
  if(task.duration<=0){rs.taskIndex++;save();showNext();return;}

  // Determine if block status is changing
  let prevBlocked=null;
  if(rs.taskIndex>0){
    const prevTask=tasks[rs.taskIndex-1];
    prevBlocked=prevTask.blockApps!==false;
  }
  const curBlocked=task.blockApps!==false;
  const blockChanged=prevBlocked!==null&&prevBlocked!==curBlocked;

  // Notification
  const blockMsg=curBlocked?'🔒 Apps blocked':'🔓 Apps free';
  notify(`Next: ${task.name}`,`${fmt(task.duration)} — ${blockMsg}${task.note?'\n'+task.note:''}`,'next-task',
    [{action:'open',title:'Open Routine'}]);
  forceOpen();

  document.getElementById('nextTaskName').textContent=task.name;
  const noteEl=document.getElementById('nextTaskNote');
  noteEl.textContent=task.note||'';noteEl.classList.toggle('hidden',!task.note);

  const adjEl=document.getElementById('adjustmentMsg');
  if(task._adj&&task._adjBy>0){
    adjEl.textContent=`${task.name} adjusted to ${fmt(task.duration)} — previous task overran by ${fmt(task._adjBy)}`;
    adjEl.classList.remove('hidden');
  } else adjEl.classList.add('hidden');

  const bsEl=document.getElementById('nextBlockStatus');
  bsEl.textContent=curBlocked?'🔒  Apps blocked during this task':'🔓  Apps free during this task';
  bsEl.className=`next-block-status ${curBlocked?'blocked':'unblocked'}`;

  const bcEl=document.getElementById('nextBlockChange');
  if(blockChanged){
    bcEl.textContent=curBlocked?'⚡ Switching to blocked — enable Screen Time':'⚡ Switching to free — disable Screen Time';
    bcEl.classList.remove('hidden');
  } else bcEl.classList.add('hidden');

  document.getElementById('nextTaskScreen').classList.add('open');
  let cd=60;
  const cdEl=document.getElementById('nextCountdown'),sbEl=document.getElementById('startBtn');
  cdEl.textContent=cd;sbEl.className='start-btn disabled';
  clearInterval(nxtTmr);
  nxtTmr=setInterval(()=>{cd--;cdEl.textContent=Math.max(0,cd);if(cd<=0){clearInterval(nxtTmr);sbEl.className='start-btn enabled';}},1000);
}

function startNextTask(){
  document.getElementById('nextTaskScreen').classList.remove('open');
  clearInterval(nxtTmr);st.runState.startTime=Date.now();save();renderActive();
}

function renderActive(){
  const rs=st.runState,c=document.getElementById('runMode'),tasks=computeAdj();
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  if(rs.taskIndex>=tasks.length||nm>=DAY_END){markDone();c.innerHTML=idle('🌙','Day complete','Great work today.');return;}
  const task=tasks[rs.taskIndex],durS=task.duration*60;
  const el=rs.startTime?Math.floor((Date.now()-rs.startTime)/1000):0;
  const rem=Math.max(0,durS-el),prog=durS>0?Math.min(1,el/durS):1;
  const circ=2*Math.PI*96,off=circ*(1-prog);
  const bl=task.blockApps!==false;

  c.innerHTML=`<div class="run-container">
    <div class="streak-dots">${streakDots()}</div>
    <div class="block-status-banner ${bl?'blocked':'unblocked'}">${bl?'🔒 Apps Blocked':'🔓 Apps Free'}</div>
    <div class="timer-ring-container">
      <svg viewBox="0 0 220 220">
        <circle class="timer-ring-bg" cx="110" cy="110" r="96"/>
        <circle class="timer-ring-progress" cx="110" cy="110" r="96" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/>
      </svg>
      <div class="timer-text">
        <div class="timer-digits" id="timerD">${fmtS(rem)}</div>
        <div class="timer-label">remaining</div>
      </div>
    </div>
    <div class="run-task-name">${esc(task.name)}</div>
    ${task.note?`<div class="run-task-note">${esc(task.note)}</div>`:''}
    <div class="run-task-type-badge ${task.type}">${lockSvg(task.type)} ${task.type}</div>
    <button class="complete-btn ${rem<=0?'enabled':'disabled'}" id="cBtn" onclick="completeTask()">
      ${rem<=0?'Task Complete ✓':'Timer Running...'}
    </button>
  </div>`;

  // Schedule completion notification
  if(endTO)clearTimeout(endTO);
  if(rem>0){
    endTO=setTimeout(()=>{
      notify(`✓ ${task.name} — Time's Up`,'Tap to mark complete and continue.','task-done',
        [{action:'open',title:'Complete Task'}]);
      forceOpen();
    },rem*1000);

    // 2-minute warning
    if(rem>120){
      if(window._warn2)clearTimeout(window._warn2);
      window._warn2=setTimeout(()=>{
        notify(`⏰ 2 min left: ${task.name}`,'Wrap up — next task incoming.','warn-2',
          [{action:'open',title:'Open'}]);
      },(rem-120)*1000);
    }
  }

  clearInterval(runTmr);
  runTmr=setInterval(()=>{
    const n2=new Date(),nm2=n2.getHours()*60+n2.getMinutes();
    if(nm2>=DAY_END){clearInterval(runTmr);markDone();renderRun();return;}
    const el2=rs.startTime?Math.floor((Date.now()-rs.startTime)/1000):0;
    const rem2=Math.max(0,durS-el2),prog2=durS>0?Math.min(1,el2/durS):1;
    const d=document.getElementById('timerD'),r=document.querySelector('.timer-ring-progress'),b=document.getElementById('cBtn');
    if(d)d.textContent=fmtS(rem2);
    if(r)r.style.strokeDashoffset=circ*(1-prog2);
    if(b&&rem2<=0){b.className='complete-btn enabled';b.textContent='Task Complete ✓';}
  },500);
}

function completeTask(){
  clearInterval(runTmr);if(endTO)clearTimeout(endTO);if(window._warn2)clearTimeout(window._warn2);
  const rs=st.runState,tasks=computeAdj(),task=tasks[rs.taskIndex];
  const durS=task.duration*60,el=rs.startTime?Math.floor((Date.now()-rs.startTime)/1000):0;
  if(task.type==='unskippable'&&el>durS){
    rs.adjustments.push({taskIndex:rs.taskIndex,overranBy:Math.ceil((el-durS)/60)});
  }
  rs.taskIndex++;rs.startTime=null;rs.completedTasks=(rs.completedTasks||0)+1;
  // Clear warned flag
  delete rs._warned2min;
  save();
  rs.taskIndex>=computeAdj().length?(markDone(),showDayDone()):showNext();
}

function markDone(){
  const today=dStr(new Date());
  if(!st.streaks.find(s=>s.date===today)){
    st.streaks.push({date:today,completed:true});
    if(st.streaks.length>30)st.streaks=st.streaks.slice(-30);
  }
  save();
}
function streakDots(){
  const today=new Date(),dots=[];
  for(let i=4;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=dStr(d),isT=i===0,f=st.streaks.some(s=>s.date===ds);
    dots.push(`<div class="streak-dot ${f?'filled':''} ${isT?'today':''}"></div>`);
  }
  return dots.join('');
}
function showDayDone(){
  notify('🎉 Day Complete!','You finished your entire routine. Great work.','day-done',[]);
  document.getElementById('dayCompleteScreen').classList.add('open');
}
function closeDayComplete(){
  document.getElementById('dayCompleteScreen').classList.remove('open');
  st.runState=null;save();switchMode('builder');
}

// Refresh on visibility change
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&st.mode==='run'&&st.runState&&st.runState.startTime)renderActive();
});

// ─── INIT ───
load();checkNotifBanner();switchMode('builder');

// ─── SERVICE WORKER (inline) ───
const SW=`
const C='routine-v3';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));});
self.addEventListener('notificationclick',e=>{
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(cls=>{
    for(const c of cls){if(c.url.includes(self.location.origin)){c.focus();return c;}}
    return clients.openWindow(e.notification.data&&e.notification.data.url||'/');
  }));
});`;
if('serviceWorker' in navigator){
  const b=new Blob([SW],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}
</script>
